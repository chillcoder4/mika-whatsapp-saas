services:
  - type: web
    name: mika-whatsapp-saas
    env: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_CLIENT_ID
        sync: false
      - key: FIREBASE_CLIENT_X509_CERT_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_PRIMARY
        sync: false
      - key: GROQ_SECONDARY
        sync: false
      - key: GROQ_3
        sync: false
      - key: GROQ_4
        sync: false
      - key: GROQ_5
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: SERPER_API_KEY2
        sync: false
    disks:
      - name: whatsapp-sessions
        mountPath: /app/sessions
        sizeGB: 1